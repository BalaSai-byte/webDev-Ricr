<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <table cellspacing="0">
      <div>
        <tr>
          <td>
            <h3><center>CONTACT US</center></h3>
          </td>
        </tr>
      </div>
      <div>
        <tr>
          <td>
            <input
              class="abc"
              type="text"
              name="name"
              id="name"
              placeholder="Name"
            />
          </td>
        </tr>
      </div>
      <div>
        <tr>
          <td>
            <input
              class="abc"
              type="text"
              name="subject"
              id="subject"
              placeholder="Subject"
            />
          </td>
        </tr>
      </div>
      <div>
        <tr>
          <td>
            <input
              class="abc"
              type="number"
              name="phoneNumber"
              id="phoneNumber"
              placeholder="Phone"
            />
          </td>
        </tr>
      </div>
      <div>
        <tr>
          <td>
            <input
              class="abc"
              type="email"
              name="email"
              id="email"
              placeholder="Email"
            />
          </td>
        </tr>
      </div>
      <div>
        <tr>
          <td><textarea name="textarea" id="textarea"></textarea></td>
        </tr>
      </div>

      <div>
        <tr>
          <td><div id="submitButton">Submit</div></td>
        </tr>
      </div>
    </table>
  </body>
</html>

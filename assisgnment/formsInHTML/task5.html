<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h3><center>APPLICATION FORM</center></h3>
    <fieldset>
      <legend>Personal Details</legend>
      <table border="0" cellspacing="10">
        <tr>
          <td width="300"><b>Applicant's full name</b></td>
          <td width="500">
            <select name="applicantTitle" id="applicantTitle">
              <option value="">--Select--</option>
              <option value="mr">Mr.</option>
              <option value="mrs">Mrs.</option></select
            ><input type="text" name="applicantName" id="applicantName" />
          </td>
          <td width="300"><b>Care Of</b></td>
          <td width="500">
            <span>Parents</span
            ><input type="radio" name="careOf" id="careOf" /><span
              >Guardian</span
            ><input type="radio" name="careOf" id="careOf" />
          </td>
        </tr>
        <tr>
          <td><b>Father's Name</b></td>
          <td>
            <select name="fatherTitle" id="fatherTitle">
              <option value="fatherTitle">Mr.</option></select
            ><input type="text" name="fatherName" id="fatherName" />
          </td>
          <td><b>Mother's Name</b></td>
          <td>
            <select name="motherTitle" id="motherTitle">
              <option value="motherTitle">Mrs.</option></select
            ><input type="text" name="motherName" id="motherName" />
          </td>
        </tr>
        <tr>
          <td><b>Gender</b></td>
          <td>
            <span>Male</span
            ><input type="radio" name="gender" id="gender" /><span>Female</span
            ><input type="radio" name="gender" id="gender" /><span>Others</span
            ><input type="radio" name="gender" id="gender" />
          </td>
          <td><b>Date of Birth</b></td>
          <td><input type="date" name="dob" id="dob" /></td>
        </tr>
        <tr>
          <td><b>Marital Status</b></td>
          <td>
            <select name="maritalStatus" id="maritalStatus">
              <option value="">--Select--</option>
              <option value="">Married</option>
              <option value="">Unmarried</option>
            </select>
          </td>
          <td><b>Category</b></td>
          <td>
            <select name="category" id="category">
              <option value="">--Select--</option>
              <option value="category">Married</option>
              <option value="category">SC/ST</option>
              <option value="category">OBC</option>
            </select>
          </td>
        </tr>
        <tr>
          <td><b>Handicapped</b></td>
          <td>
            <span>No</span
            ><input type="radio" name="handicapped" id="handicapped" /><span
              >Yes</span
            ><input type="radio" name="handicapped" id="handicapped" />
          </td>
          <td><b>Ex-Serviceman</b></td>
          <td>
            <span>No</span
            ><input type="radio" name="exServiceman" id="exServiceman" /><span
              >Yes</span
            ><input type="radio" name="exServiceman" id="exServiceman" />
          </td>
        </tr>
        <tr>
          <td><b>EWS</b></td>
          <td>
            <span>No</span><input type="radio" name="ews" id="ews" /><span
              >Yes</span
            ><input type="radio" name="ews" id="ews" />
          </td>
          <td><b>Religion</b></td>
          <td>
            <select name="religion" id="religion">
              <option value="">--Select--</option>
              <option value="religion">Hindu</option>
              <option value="religion">Islam</option>
              <option value="religion">Christianity</option>
              <option value="religion">Sikhism</option>
            </select>
          </td>
        </tr>
      </table>
    </fieldset>
  </body>
</html>
